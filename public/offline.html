<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>rJournaler — Offline</title>
  <style>
    body { font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial; margin: 2rem; color:#222; }
    .card { max-width:640px; margin:0 auto; padding:1.2rem; border-radius:8px; border:1px solid #ddd; background:#fff; }
    h1 { margin-top:0; }
  </style>
</head>
<body>
  <main class="card">
    <h1>You're offline</h1>
    <p>It looks like you're not connected to the network. Drafts will continue to save locally and be synced when connectivity is restored.</p>
    <p>Open the app again when you're online to flush pending autosaves.</p>
  </main>
</body>
</html>
